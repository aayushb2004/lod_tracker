<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LOD Tracker</title>
  <script>
    (function () {
      var saved = localStorage.getItem('lod-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="topnav">
    <span class="brand">LOD Tracker</span>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('add') }}">+ Add Entry</a>
    <a href="{{ url_for('import_csv') }}">Import CSV</a>
    <button type="button" id="theme-toggle"></button>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');

      function currentTheme() {
        var explicit = document.documentElement.getAttribute('data-theme');
        if (explicit) return explicit;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function render() {
        btn.textContent = currentTheme() === 'dark' ? '☀️ Light' : '🌙 Dark';
      }

      btn.addEventListener('click', function () {
        var next = currentTheme() === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('lod-theme', next);
        render();
      });

      render();
    })();
  </script>
  <script>
    document.addEventListener('submit', function (e) {
      if (e.defaultPrevented) return;
      var form = e.target;
      if ((form.method || '').toLowerCase() !== 'post') return;
      var btn = e.submitter;
      if (!btn || btn.tagName !== 'BUTTON') return;
      if (btn.dataset.submitting === '1') {
        e.preventDefault();
        return;
      }
      btn.dataset.submitting = '1';
      btn.dataset.originalText = btn.textContent;
      btn.textContent = 'Saving...';
      btn.style.opacity = '0.6';
      btn.style.pointerEvents = 'none';
    });

    window.addEventListener('pageshow', function () {
      document.querySelectorAll('button[data-submitting="1"]').forEach(function (btn) {
        btn.dataset.submitting = '';
        btn.style.opacity = '';
        btn.style.pointerEvents = '';
        if (btn.dataset.originalText) btn.textContent = btn.dataset.originalText;
      });
    });
  </script>
  <script>
    // AI tag suggestions — works on any page with .suggest-tags buttons inside .entry-row
    document.addEventListener('click', async function (e) {
      var btn = e.target.closest('.suggest-tags');
      if (!btn) return;
      var row = btn.closest('.entry-row');
      var summary = (row.querySelector('textarea') || {}).value || '';
      var box = row.querySelector('.suggested-tags');
      if (!summary.trim()) {
        box.textContent = 'Write a call summary first.';
        return;
      }
      btn.disabled = true;
      var orig = btn.textContent;
      btn.textContent = 'Thinking…';
      box.textContent = '';
      try {
        var resp = await fetch('/api/suggest_tags', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ summary: summary }),
        });
        var data = await resp.json();
        if (!resp.ok) {
          box.textContent = data.error || 'Suggestion failed.';
          return;
        }
        var matched = 0;
        (data.existing_tags || []).forEach(function (t) {
          row.querySelectorAll('.tag-checks input[type="checkbox"]').forEach(function (cb) {
            if (cb.value === t && !cb.checked) { cb.checked = true; matched++; }
          });
        });
        (data.new_tags || []).forEach(function (t) {
          var chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'tag-chip suggestion';
          chip.textContent = '+ ' + t;
          chip.addEventListener('click', function () {
            var inp = row.querySelector('input[name^="newtags"]');
            inp.value = inp.value.trim() ? inp.value.trim() + ', ' + t : t;
            chip.remove();
          });
          box.appendChild(chip);
        });
        if (!matched && !(data.new_tags || []).length) {
          box.textContent = 'No tag suggestions for this summary.';
        } else if (matched) {
          var note = document.createElement('span');
          note.className = 'hint';
          note.textContent = matched + ' existing tag' + (matched > 1 ? 's' : '') + ' ticked. ';
          box.prepend(note);
        }
      } catch (err) {
        box.textContent = 'Network error — try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
      }
    });
  </script>
</body>
</html>
